<!DOCTYPE html>
<html>
	<head>
		<meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
		<meta charset="utf-8">
		<meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
		<meta name="viewport" content="user-scalable=no,width=device-width,minimum-scale=1,initial-scale=1,maximum-scale=1">
		<meta name="msapplication-tap-highlight" content="no">
		<title>Wingbot.ai</title>

		<meta name="description" content="">
		<meta name="author" content="wingbot.ai" />

		<link rel="canonical" href="http:/localhost:3000/index.html" />

		<meta property="og:type" content="website">
		<meta property="og:url" content="http:/localhost:3000/index.html">
		<meta property="og:description" content="">

		<link href="https://fonts.googleapis.com/css?family=Rubik:300,400,500,700" rel="stylesheet">
		<link href="https://cdn.jsdelivr.net/npm/bulma@1.0.4/css/bulma.min.css" rel="stylesheet">
		<link href="/style.css" rel="stylesheet">
	</head>

	<body>
		<section class="hero is-fullheight">
		    <!-- Hero head: will stick at the top -->
		    <div class="hero-head has-cs-bg">
		        <div class="level menu is-mobile">
		            <div class="level-item">
		                <!-- LOGO -->
		            </div>
		        </div>
		    </div>
		
		    <!-- Hero content: will be in the middle -->
		    <div class="hero-body">
		        <div id="webchat" class="chat"></div>
		        <link href="https://chat.wingbot.ai/styles/wingbotChat.css" rel='stylesheet' type='text/css'>
		
		        <div id="chat"></div>
		        <script>
		            window.wingbotChatCmds=window.wingbotChatCmds||[];window.wingbotChat=window.wingbotChat||function(){wingbotChatCmds.push(arguments)}
		
		            wingbotChat('init', {
		                api: 'http://localhost:3000',
		                websocket: 'ws://localhost:3000',
		                pageId: 'page',
		                fullscreen: true,
		                cdnEmoji: true
		            }, document.getElementById('chat'));
		        </script>
		        <script async src="https://chat.wingbot.ai/wingbotChat.js"></script>
		    </div>
		
		    <div class="hero-foot">
		        <div class="container">
		            <div class="section has-text-black has-text-centered p-2">
		            </div>
		        </div>
		    </div>
		</section>
	</body>
</html>
